# Build Skiko and collect JARs (no tests)
name: Build JARs

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
        name: 'Check out code'

      - uses: actions/setup-java@v3
        name: 'Set up JDK 11'
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'

      - shell: bash
        name: 'Build and publish to Maven Local'
        continue-on-error: true
        run: |
          ./gradlew --stacktrace --info -Pskiko.native.enabled=true :skiko:publishToMavenLocal -x test -x awtTest -x macosX64Test

      - shell: bash
        name: 'Build Debug version'
        continue-on-error: true
        run: |
          ./gradlew --stacktrace --info -Pskiko.native.enabled=true :skiko:publishToMavenLocal -Pskiko.debug=true -x test

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload macOS JARs'
        with:
          name: skiko-jars-macos
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  iOS:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
        name: 'Check out code'

      - uses: actions/setup-java@v3
        name: 'Set up JDK 11'
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'

      - shell: bash
        name: 'Build iOS targets'
        continue-on-error: true
        run: |
          ./gradlew --stacktrace --info -Pskiko.native.enabled=true :skiko:publishToMavenLocal -x test -x iosX64Test -x iosSimulatorArm64Test

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload iOS JARs'
        with:
          name: skiko-jars-ios
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  tvOS:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'
          
      - shell: bash
        name: 'Build tvOS targets'
        continue-on-error: true
        run: |
          ./gradlew --stacktrace --info -Pskiko.native.enabled=true :skiko:publishToMavenLocal -x test -x tvosX64Test -x tvosSimulatorArm64Test

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload tvOS JARs'
        with:
          name: skiko-jars-tvos
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
        name: 'Check out code'

      - uses: actions/setup-java@v3
        name: 'Set up JDK 11'
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'

      - uses: nttld/setup-ndk@v1
        name: 'Set up Android NDK'
        id: setup-ndk
        with:
          ndk-version: r21e

      - uses: android-actions/setup-android@v2
        name: 'Set up Android SDK'

      - shell: bash
        name: 'Set up Linux build environment'
        run: |
          sudo apt-get update -y
          sudo apt-get install build-essential software-properties-common -y
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -y
          sudo apt-get install gcc-9 g++-9 -y
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 60 --slave /usr/bin/g++ g++ /usr/bin/g++-9
          sudo update-alternatives --config gcc
          sudo apt-get install ninja-build fontconfig libfontconfig1-dev libglu1-mesa-dev libxrandr-dev libdbus-1-dev zip -y
          sudo apt-get install gcc-9-aarch64-linux-gnu g++-9-aarch64-linux-gnu -y
          sudo update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-9 60 --slave /usr/bin/aarch64-linux-gnu-g++ aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-gnu-g++-9
          sudo update-alternatives --config aarch64-linux-gnu-gcc

      - shell: bash
        name: 'Build Linux x64'
        continue-on-error: true
        run: |
          ./gradlew --no-daemon --stacktrace --info -Pskiko.native.enabled=true -Pkotlin.native.cacheKind.linuxX64=none :skiko:publishToMavenLocal -x test -x linuxX64Test -x awtTest

      - shell: bash
        name: 'Build Linux ARM64'
        continue-on-error: true
        run: |
          ./gradlew --no-daemon --stacktrace --info -Pskiko.native.enabled=true :skiko:linkReleaseSharedLinuxArm64 :skiko:publishToMavenLocal -x test

      - shell: bash
        name: 'Build Android targets'
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew --no-daemon -Pskiko.android.enabled=true :skiko:publishSkikoJvmRuntimeAndroidX64PublicationToMavenLocal :skiko:publishSkikoJvmRuntimeAndroidArm64PublicationToMavenLocal :skiko:publishAndroidReleasePublicationToMavenLocal -x test

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload Linux JARs'
        with:
          name: skiko-jars-linux
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  linux-arm:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v3
        name: 'Check out code'

      - uses: actions/setup-java@v3
        name: 'Set up JDK 11'
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'

      - shell: bash
        name: 'Set up Linux ARM build environment'
        run: |
          sudo apt-get update -y
          sudo apt-get install build-essential software-properties-common -y
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -y
          sudo apt-get install clang-11 -y
          sudo apt-get remove g++ -y
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-11 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-11 100
          sudo apt-get install ninja-build fontconfig libfontconfig1-dev libglu1-mesa-dev libxrandr-dev libdbus-1-dev zip -y

      - shell: bash
        name: 'Build Linux ARM64'
        continue-on-error: true
        run: |
          ./gradlew --no-daemon --stacktrace --info :skiko:publishToMavenLocal -x test -x awtTest

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload Linux ARM JARs'
        with:
          name: skiko-jars-linux-arm
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3
        name: 'Check out code'

      - uses: microsoft/setup-msbuild@v1

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-java@v3
        name: 'Set up JDK 11'
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: 'gradle'

      - shell: bash
        name: 'Build Windows'
        continue-on-error: true
        run: |
          ./gradlew --stacktrace --info :skiko:publishToMavenLocal -x test -x awtTest

      - name: 'Collect JARs'
        shell: bash
        run: |
          mkdir -p ./artifacts
          find ~/.m2/repository -name "*.jar" -path "*/skiko/*" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          find ./skiko/build/libs -name "*.jar" -exec cp {} ./artifacts/ \; 2>/dev/null || true
          ls -la ./artifacts/ || true

      - uses: actions/upload-artifact@v4
        name: 'Upload Windows JARs'
        with:
          name: skiko-jars-windows
          path: ./artifacts/*.jar
          if-no-files-found: ignore
          retention-days: 30

  collect-all-jars:
    needs: [macos, iOS, tvOS, linux, linux-arm, windows]
    runs-on: ubuntu-22.04
    if: always()  # Run even if some platforms failed
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./platform-jars
          pattern: skiko-jars-*

      - name: 'Combine all JARs'
        shell: bash
        run: |
          mkdir -p ./all-jars
          find ./platform-jars -name "*.jar" -exec cp {} ./all-jars/ \; 2>/dev/null || true
          # Remove duplicates by keeping only unique files
          cd ./all-jars
          for file in *.jar; do
            if [ -f "$file" ]; then
              md5sum "$file" >> checksums.txt
            fi
          done
          # Keep only unique files based on checksum
          awk '!seen[$1]++ {print $2}' checksums.txt > unique_files.txt
          mkdir ../final-jars
          while IFS= read -r file; do
            cp "$file" ../final-jars/ 2>/dev/null || true
          done < unique_files.txt
          cd ..
          echo "Final JAR count: $(ls -1 ./final-jars/*.jar 2>/dev/null | wc -l)"
          ls -la ./final-jars/

      - uses: actions/upload-artifact@v4
        name: 'Upload all unique JARs'
        with:
          name: skiko-all-jars
          path: ./final-jars/*.jar
          if-no-files-found: warn
          retention-days: 30
